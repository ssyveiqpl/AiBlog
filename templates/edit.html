{% extends "base.html" %}
{% block title %}编辑文章{% endblock %}
{% block content %}
<h1>编辑文章</h1>
<form method="POST" class="form-card">
    <label for="title">标题</label>
    <input type="text" name="title" id="title" value="{{ post.title }}" required>
    <label for="category">分类</label>
    <input type="text" name="category" id="category" value="{{ post.category }}" placeholder="如 AI、Python、生活随笔">
    <label for="tags">标签</label>
    <input type="text" name="tags" id="tags" value="{{ post.tags }}" placeholder="用逗号分隔，如 AI, Python, 深度学习">
    <label for="cover_image">封面图片 URL</label>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input type="text" name="cover_image" id="cover_image" value="{{ post.cover_image }}" placeholder="https://example.com/image.jpg 或留空" style="flex:1;margin-bottom:0;">
        <button type="button" class="btn btn-secondary" id="coverUploadBtn" style="flex-shrink:0;">上传</button>
        <input type="file" id="coverFileInput" accept="image/*" style="display:none">
    </div>
    {% if series_list %}
    <label for="series_id">所属系列 <small style="color:var(--text-muted);font-weight:400;">选填</small></label>
    <select name="series_id" id="series_id" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9em;margin-bottom:16px;font-family:inherit;background:var(--bg);color:var(--text);">
        <option value="">无</option>
        {% for s in series_list %}
        <option value="{{ s.id }}" {% if post.series_id == s.id %}selected{% endif %}>{{ s.name }}</option>
        {% endfor %}
    </select>
    {% endif %}
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <label style="font-size:.85em;font-weight:500;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="status" value="published" {% if post.status == 'published' %}checked{% endif %}> 已发布
        </label>
        <label style="font-size:.85em;font-weight:500;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="status" value="draft" {% if post.status == 'draft' %}checked{% endif %}> 草稿
        </label>
    </div>
    <label>内容 <small style="color:var(--text-muted);font-weight:400;">支持 Markdown</small></label>
    <div class="editor-wrapper">
        <div class="editor-pane">
            <textarea name="content" id="content" rows="20" required>{{ post.content }}</textarea>
            <div class="editor-toolbar">
                <button type="button" class="editor-btn" data-md="**" data-wrap="bold" title="加粗"><i class="fas fa-bold"></i></button>
                <button type="button" class="editor-btn" data-md="*" data-wrap="italic" title="斜体"><i class="fas fa-italic"></i></button>
                <button type="button" class="editor-btn" data-md="# " title="标题"><i class="fas fa-heading"></i></button>
                <button type="button" class="editor-btn" data-md="[text](url)" title="链接"><i class="fas fa-link"></i></button>
                <button type="button" class="editor-btn" id="uploadBtn" title="插入图片"><i class="fas fa-image"></i></button>
                <button type="button" class="editor-btn" data-md="```\n" data-suffix="\n```" title="代码块"><i class="fas fa-code"></i></button>
                <button type="button" class="editor-btn" data-md="> " title="引用"><i class="fas fa-quote-right"></i></button>
                <button type="button" class="editor-btn" data-md="- " title="列表"><i class="fas fa-list"></i></button>
                <input type="file" id="fileInput" accept="image/*" style="display:none">
            </div>
        </div>
        <div class="preview-pane" id="livePreview">
            <div class="preview-placeholder">预览区域</div>
        </div>
    </div>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
{% block scripts %}
<script>
(function() {
    var content = document.getElementById('content');
    var preview = document.getElementById('livePreview');
    var uploadBtn = document.getElementById('uploadBtn');
    var fileInput = document.getElementById('fileInput');
    var coverUploadBtn = document.getElementById('coverUploadBtn');
    var coverFileInput = document.getElementById('coverFileInput');
    var coverInput = document.getElementById('cover_image');

    document.querySelectorAll('.editor-btn[data-md]').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var md = btn.getAttribute('data-md');
            var suffix = btn.getAttribute('data-suffix') || '';
            var start = content.selectionStart;
            var end = content.selectionEnd;
            var text = content.value;
            var before = text.substring(0, start);
            var selected = text.substring(start, end);
            var after = text.substring(end);
            var wrap = btn.getAttribute('data-wrap');
            if (wrap === 'bold') {
                content.value = before + '**' + selected + '**' + after;
            } else if (wrap === 'italic') {
                content.value = before + '*' + selected + '*' + after;
            } else {
                if (selected) {
                    content.value = before + md + selected + suffix + after;
                } else {
                    content.value = before + md + after;
                }
            }
            content.focus();
            updatePreview();
        });
    });

    function renderPreview(text) {
        if (!text.trim()) return '<div class="preview-placeholder">预览区域</div>';
        var html = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
                return '<pre><code class="language-' + lang + '">' + code.trim() + '</code></pre>';
            })
            .replace(/`([^`]+)`/g, '<code>$1</code>')
            .replace(/### (.+)/g, '<h3>$1</h3>')
            .replace(/## (.+)/g, '<h2>$1</h2>')
            .replace(/# (.+)/g, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;border-radius:8px;">')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/\n/g, '<br>');
        return html;
    }

    function updatePreview() {
        preview.innerHTML = renderPreview(content.value);
        preview.querySelectorAll('pre code').forEach(function(block) {
            hljs.highlightElement(block);
        });
    }

    content.addEventListener('input', updatePreview);
    updatePreview();

    uploadBtn.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
        var file = fileInput.files[0];
        if (!file) return;
        var formData = new FormData();
        formData.append('file', file);
        fetch('{{ url_for("upload_image") }}', {
            method: 'POST',
            body: formData
        }).then(function(r) { return r.json(); }).then(function(data) {
            if (data.url) {
                var md = '![](' + data.url + ')';
                var start = content.selectionStart;
                var end = content.selectionEnd;
                content.value = content.value.substring(0, start) + md + content.value.substring(end);
                updatePreview();
            }
        }).catch(function() { alert('上传失败'); });
    });

    if (coverUploadBtn) {
        coverUploadBtn.addEventListener('click', function() { coverFileInput.click(); });
        coverFileInput.addEventListener('change', function() {
            var file = coverFileInput.files[0];
            if (!file) return;
            var formData = new FormData();
            formData.append('file', file);
            fetch('{{ url_for("upload_image") }}', {
                method: 'POST',
                body: formData
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.url) {
                    coverInput.value = data.url;
                }
            }).catch(function() { alert('上传失败'); });
        });
    }
})();
</script>
{% endblock %}
