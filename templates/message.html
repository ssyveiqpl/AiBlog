{% extends "base.html" %}
{% block title %}留言板{% endblock %}
{% block content %}
<div class="profile-card" style="padding:20px;margin-bottom:16px;">
    <h1 style="margin-bottom:4px;">留言板</h1>
    <p style="color:var(--text-secondary);font-size:.85em;">欢迎留下你的想法和建议</p>
</div>

<div class="msg-form">
    <form method="post">
        <input type="text" name="name" placeholder="你的名字" required>
        <textarea name="content" placeholder="写下你想说的话..." required></textarea>
        <button type="submit" class="btn btn-primary" style="width:100%;">提交留言</button>
    </form>
</div>

<div class="section-title">全部留言</div>

{% for m in messages %}
<div class="chat-card">
    <div class="chat-msg">
        <div class="chat-avatar">{{ m.name[:1] }}</div>
        <div style="flex:1;">
            <div class="chat-name">{{ m.name }} <span class="chat-time">{{ m.created_at }}</span></div>
            <div class="chat-bubble">{{ m.content }}</div>
        </div>
    </div>
</div>
{% else %}
<p class="empty">还没有留言，来写下第一条吧</p>
{% endfor %}
{% endblock %}
