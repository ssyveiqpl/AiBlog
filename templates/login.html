{% extends "base.html" %}
{% block title %}{{ _t('login') }}{% endblock %}
{% block content %}
<div class="profile-card" style="padding:40px 20px;">
    <h1 style="text-align:center;margin-bottom:24px;">{{ _t('login_title') }}</h1>
    <form method="POST" class="form-card">
        <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
        <input type="password" name="password" placeholder="{{ _t('login_password') }}" required>
        <button type="submit" class="btn btn-primary" style="width:100%;">{{ _t('login_btn') }}</button>
    </form>
</div>
{% endblock %}
