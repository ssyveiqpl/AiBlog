{% extends "base.html" %}
{% block title %}{{ code }} - {{ message }}{% endblock %}
{% block content %}
<div class="profile-card" style="padding:60px 20px;">
    <div style="font-size:3em;font-weight:700;color:var(--wechat-green);margin-bottom:16px;">{{ code }}</div>
    <h1 style="margin-bottom:12px;">{{ message }}</h1>
    <p style="color:var(--text-secondary);font-size:.85em;margin-bottom:24px;">{{ _t('error_desc') }}</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">{{ _t('back_home') }}</a>
</div>
{% endblock %}
