{% extends "base.html" %}
{% block title %}导入/导出{% endblock %}
{% block content %}
<div class="admin-header">
    <h1>导入/导出</h1>
    <a href="{{ url_for('admin') }}" class="btn btn-secondary">&larr; 返回后台</a>
</div>

<div class="full-post-card" style="margin-bottom:16px;">
    <h2>导出文章</h2>
    <p style="color:var(--text-secondary);font-size:.85em;margin-bottom:16px;">将所有文章导出为 Markdown 文件（ZIP 压缩包），包含 Front Matter 元数据。</p>
    <a href="{{ url_for('export_posts') }}" class="btn btn-primary"><i class="fas fa-download"></i> 导出为 ZIP</a>
</div>

<div class="full-post-card">
    <h2>导入文章</h2>
    <p style="color:var(--text-secondary);font-size:.85em;margin-bottom:16px;">支持导入单个 .md 文件或包含多篇 Markdown 的 .zip 压缩包。文件需包含 Front Matter（title/date/category/tags）或一级标题。</p>
    <form method="POST" enctype="multipart/form-data">
        <label for="file">选择文件</label>
        <input type="file" name="file" id="file" accept=".md,.zip" required>
        <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> 导入</button>
    </form>
</div>
{% endblock %}
