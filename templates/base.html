<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}AI探索笔记{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <span class="top-bar-title">AI探索笔记</span>
            <div class="top-bar-actions">
                {% if session.logged_in %}
                    <a href="{{ url_for('admin') }}" style="color:var(--text-secondary);text-decoration:none;font-size:.82em;">管理</a>
                {% endif %}
                <button class="theme-btn" id="themeBtn" title="切换主题">🌙</button>
            </div>
        </div>
    </div>

    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flash">
                {% for msg in messages %}
                    <li>{{ msg }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>

    <nav class="tab-bar">
        <div class="tab-bar-inner">
            <a href="{{ url_for('index') }}" class="tab-item {% if request.endpoint == 'index' %}active{% endif %}">
                <i class="fas fa-newspaper"></i>
                <span>首页</span>
            </a>
            <a href="{{ url_for('articles') }}" class="tab-item {% if request.endpoint == 'articles' %}active{% endif %}">
                <i class="fas fa-file-alt"></i>
                <span>文章</span>
            </a>
            <a href="{{ url_for('projects') }}" class="tab-item {% if request.endpoint == 'projects' %}active{% endif %}">
                <i class="fas fa-code-branch"></i>
                <span>项目</span>
            </a>
            <a href="{{ url_for('message') }}" class="tab-item {% if request.endpoint == 'message' %}active{% endif %}">
                <i class="fas fa-comment-dots"></i>
                <span>留言</span>
            </a>
            <a href="{{ url_for('about') }}" class="tab-item {% if request.endpoint == 'about' %}active{% endif %}">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </a>
        </div>
    </nav>

<script>
(function() {
    var btn = document.getElementById('themeBtn');
    var body = document.body;
    var stored = localStorage.getItem('theme');
    if (stored === 'dark') {
        body.classList.add('dark');
        btn.textContent = '☀️';
    }
    btn.addEventListener('click', function() {
        var isDark = body.classList.toggle('dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
})();
</script>
</body>
</html>
