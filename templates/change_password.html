{% extends "base.html" %}
{% block title %}{{ _t('change_pwd_title') }}{% endblock %}
{% block content %}
<h1>{{ _t('change_pwd') }}</h1>
<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <label for="old_password">{{ _t('old_pwd') }}</label>
    <input type="password" name="old_password" id="old_password" placeholder="{{ _t('old_pwd_ph') }}" required>
    <label for="new_password">{{ _t('new_pwd') }}</label>
    <input type="password" name="new_password" id="new_password" placeholder="{{ _t('new_pwd_ph') }}" required>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">{{ _t('change_btn') }}</button>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">{{ _t('cancel') }}</a>
    </div>
</form>
{% endblock %}
