{% extends "base.html" %}
{% block title %}修改密码{% endblock %}
{% block content %}
<h1>修改密码</h1>
<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <label for="old_password">旧密码</label>
    <input type="password" name="old_password" id="old_password" placeholder="输入旧密码" required>
    <label for="new_password">新密码</label>
    <input type="password" name="new_password" id="new_password" placeholder="输入新密码" required>
    <div style="display:flex;gap:10px;">
        <button type="submit" class="btn btn-primary">修改</button>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
