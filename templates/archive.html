{% extends "base.html" %}
{% block title %}归档{% endblock %}
{% block content %}
<div class="profile-card" style="padding:24px 20px;margin-bottom:16px;">
    <h1>文章归档</h1>
    <p style="color:var(--text-secondary);font-size:.85em;">按时间回溯所有文章</p>
</div>

{% for ym in sorted_yms %}
<div class="full-post-card" style="margin-bottom:12px;">
    <h2 style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span style="background:var(--wechat-green);color:#fff;padding:2px 10px;border-radius:3px;font-size:.8em;">{{ ym }}</span>
        <small style="color:var(--text-muted);font-weight:400;">{{ archives[ym]|length }} 篇</small>
    </h2>
    {% for p in archives[ym] %}
    <div class="info-row">
        <span class="info-value"><a href="{{ url_for('post', post_id=p.id) }}">{{ p.title }}</a></span>
        <span class="feed-time">{{ p.created_at }}</span>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="empty">还没有文章</p>
{% endfor %}
{% endblock %}
