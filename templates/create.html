{% extends "base.html" %}
{% block title %}写文章{% endblock %}
{% block content %}
<h1>写新文章</h1>
<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <label for="title">标题</label>
    <input type="text" name="title" id="title" placeholder="输入文章标题" required>
    <label for="category">分类</label>
    <input type="text" name="category" id="category" placeholder="如 AI、Python、生活随笔">
    <label for="tags">标签</label>
    <input type="text" name="tags" id="tags" placeholder="用逗号分隔，如 AI, Python, 深度学习">
    <label for="cover_image">封面图片 URL</label>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input type="text" name="cover_image" id="cover_image" placeholder="https://example.com/image.jpg 或留空" style="flex:1;margin-bottom:0;">
        <button type="button" class="btn btn-secondary" id="coverUploadBtn" style="flex-shrink:0;">上传</button>
        <input type="file" id="coverFileInput" accept="image/*" style="display:none">
    </div>
    {% if series_list %}
    <label for="series_id">所属系列 <small style="color:var(--text-muted);font-weight:400;">选填</small></label>
    <select name="series_id" id="series_id" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9em;margin-bottom:16px;font-family:inherit;background:var(--bg);color:var(--text);">
        <option value="">无</option>
        {% for s in series_list %}
        <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>
    {% endif %}
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <label style="font-size:.85em;font-weight:500;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="status" value="published" checked> 直接发布
        </label>
        <label style="font-size:.85em;font-weight:500;display:flex;align-items:center;gap:4px;">
            <input type="radio" name="status" value="draft"> 存为草稿
        </label>
    </div>
    {% set content_value = '' %}
    {% include "_editor.html" %}
    <div style="display:flex;gap:10px;margin-top:16px;">
        <button type="submit" class="btn btn-primary">发布</button>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
{% block scripts %}
<script>
(function() {
    var coverUploadBtn = document.getElementById('coverUploadBtn');
    var coverFileInput = document.getElementById('coverFileInput');
    var coverInput = document.getElementById('cover_image');
    if (coverUploadBtn) {
        coverUploadBtn.addEventListener('click', function() { coverFileInput.click(); });
        coverFileInput.addEventListener('change', function() {
            var file = coverFileInput.files[0];
            if (!file) return;
            var formData = new FormData();
            formData.append('file', file);
            fetch('{{ url_for("upload_image") }}', {
                method: 'POST',
                body: formData
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.url) coverInput.value = data.url;
            }).catch(function() { console.error('cover upload failed'); });
        });
    }
})();
</script>
{% endblock %}
