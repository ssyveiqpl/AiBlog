{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
<div class="full-post-card">
    <h1>{{ post.title }}</h1>
    <time style="font-size:.82em;color:var(--text-muted);">{{ post.created_at }}</time>
    <div class="content">{{ content_html|safe }}</div>
</div>
<a href="{{ url_for('index') }}" class="back-link">&larr; 返回首页</a>
{% endblock %}
